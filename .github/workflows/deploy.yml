name: IPL Website CI/CD

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run deterministic regression tests
        run: python3 -m unittest discover -s tests -p "test_*.py" -v

  ai-generated-tests:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository with history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate AI-driven tests from the current diff
        env:
          AI_TEST_API_KEY: ${{ secrets.AI_TEST_API_KEY }}
          AI_TEST_MODEL: ${{ secrets.AI_TEST_MODEL }}
          AI_TEST_API_URL: ${{ secrets.AI_TEST_API_URL }}
          AI_TEST_REQUIRED: ${{ vars.AI_TEST_REQUIRED || 'false' }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/${{ github.base_ref }}"
          else
            BASE_REF="${{ github.event.before }}"
          fi
          if [ -z "$BASE_REF" ] || [ "$BASE_REF" = "0000000000000000000000000000000000000000" ]; then
            BASE_REF="$(git rev-list --max-parents=0 HEAD)"
          fi
          python3 scripts/generate_ai_test_cases.py --base-ref "$BASE_REF" --head-ref HEAD

      - name: Run AI-generated Python tests when present
        run: |
          if find .ai-generated-tests -name "test_*.py" -print -quit | grep -q .; then
            python3 -m unittest discover -s .ai-generated-tests -p "test_*.py" -v
          else
            echo "No executable AI-generated Python tests were created."
          fi

      - name: Upload AI test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-test-artifacts
          path: |
            ai-test-artifacts
            .ai-generated-tests

  build:
    runs-on: ubuntu-latest
    needs:
      - test
      - ai-generated-tests

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild IPL dataset when raw source is available
        run: |
          if [ -d "data/raw/ipl_json" ] || [ -f "data/raw/ipl_json.zip" ]; then
            python3 scripts/build_ipl_data.py
          else
            echo "Raw IPL source files are not available in this checkout. Using committed data/matches.json."
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp styles.css _site/
          cp app.js _site/
          cp -R data _site/data
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
